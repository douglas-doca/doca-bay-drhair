services:
  mcp-drhair-gest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-drhair-gest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
      - PORT=3103
    volumes:
      - ./clientes:/app/clientes
      - ./keys:/app/keys:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "3103"
    networks:
      - mcp_internal
      - supabase_internal
      - doca_db_internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3103/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  mcp_internal:
    name: doca-octa_mcp_internal
    external: true
  supabase_internal:
    name: supabase_supabase_internal
    external: true
  doca_db_internal:
    name: doca-db_supabase_internal
    external: true